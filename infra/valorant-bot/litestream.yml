dbs:
  - path: /data/data.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_S3_BUCKET}
        path: data.db
        endpoint: ${LITESTREAM_S3_ENDPOINT}
        force-path-style: true
        retention: 168h          # 7-day WAL retention
        snapshot-interval: 24h   # snapshot once per day
