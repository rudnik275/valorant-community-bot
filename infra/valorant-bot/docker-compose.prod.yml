services:
  app:
    image: ghcr.io/rudnik275/valorant-community-bot:latest
    container_name: valorant-bot-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    networks: [infra-net]
    mem_limit: 512m
    cpus: 1.0
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
  litestream:
    image: litestream/litestream:latest
    container_name: valorant-bot-litestream
    # litestream v0.5+ image is distroless / nonroot (uid 65532), but data.db
    # is owned by root (the app container writes it as root) — run as root so
    # litestream can write its _litestream_seq ledger table into the source DB.
    user: "0:0"
    restart: unless-stopped
    command: replicate
    volumes:
      # rw, not ro: litestream v0.5+ writes the _litestream_seq table into the
      # source SQLite DB to track replication state.
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_S3_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_S3_SECRET_ACCESS_KEY}
      # litestream.yml interpolates ${LITESTREAM_S3_BUCKET}/${..._ENDPOINT};
      # they must be present in the container env or the s3 replica resolves
      # to an empty bucket → "bucket required for s3 replica" crash loop.
      LITESTREAM_S3_BUCKET: ${LITESTREAM_S3_BUCKET}
      LITESTREAM_S3_ENDPOINT: ${LITESTREAM_S3_ENDPOINT}
    depends_on: [app]
networks:
  infra-net:
    external: true
