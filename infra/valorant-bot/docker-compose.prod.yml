services:
  app:
    image: ghcr.io/rudnik275/valorant-community-bot:latest
    container_name: valorant-bot-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    networks: [infra-net]
    mem_limit: 512m
    cpus: 1.0
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
  litestream:
    image: litestream/litestream:latest
    container_name: valorant-bot-litestream
    restart: unless-stopped
    command: replicate
    volumes:
      - ./data:/data:ro
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_S3_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_S3_SECRET_ACCESS_KEY}
    depends_on: [app]
networks:
  infra-net:
    external: true
