name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  build-and-push:
    name: Build & Push arm64 image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/rudnik275/valorant-community-bot:${{ github.sha }}
            ghcr.io/rudnik275/valorant-community-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      packages: read
      contents: read
    steps:
      - name: Pull and restart app
        uses: appleboy/ssh-action@v1
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_ACTOR,GH_TOKEN
          script: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            PREV_IMAGE=$(docker inspect --format '{{.Image}}' valorant-bot-app 2>/dev/null || echo "none")
            echo "$PREV_IMAGE" > /opt/valorant-bot/.last-image-id
            cd /opt/valorant-bot && docker compose pull app && docker compose up -d --no-deps app

      - name: Health-gate (60s poll)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 12); do
              status=$(docker inspect --format '{{.State.Health.Status}}' valorant-bot-app 2>/dev/null || echo "none")
              if [ "$status" = "healthy" ]; then echo "✓ healthy"; exit 0; fi
              sleep 5
            done
            echo "✗ health timeout after 60s"; exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PREV=$(cat /opt/valorant-bot/.last-image-id)
            if [ "$PREV" != "none" ] && [ -n "$PREV" ]; then
              docker tag "$PREV" ghcr.io/rudnik275/valorant-community-bot:latest
              cd /opt/valorant-bot && docker compose up -d --no-deps app
            else
              echo "no previous image to rollback to"
            fi
