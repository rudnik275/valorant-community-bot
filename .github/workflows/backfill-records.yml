name: Backfill Records

on:
  workflow_dispatch:

jobs:
  backfill:
    name: Seed all_time_records and weekly_records from history
    runs-on: ubuntu-latest
    steps:
      - name: Run backfill inside running container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec valorant-bot-app bun run scripts/launch/backfill-records.ts
